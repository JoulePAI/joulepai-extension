<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=380, initial-scale=1.0">
  <title>JoulePAI Wallet</title>
  <link rel="stylesheet" href="../styles/design.css">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div id="app"></div>
  <script src="../compat.js"></script>
  <script>
    // Gate on data consent — redirect to consent screen if not yet granted
    (async () => {
      const b = typeof browser !== 'undefined' ? browser : chrome;
      const { dataConsentGranted } = await b.storage.local.get('dataConsentGranted');
      if (!dataConsentGranted) {
        window.location.href = 'consent.html';
      }
    })();
  </script>
  <script type="module" src="popup.js"></script>
</body>
</html>
